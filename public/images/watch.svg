<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Watch face background -->
  <circle cx="100" cy="100" r="90" fill="#f5f5f5" stroke="#333" stroke-width="3"/>
  
  <!-- Hour markers -->
  <g stroke="#333" stroke-width="2">
    <line x1="100" y1="15" x2="100" y2="25" />
    <line x1="100" y1="175" x2="100" y2="185" />
    <line x1="15" y1="100" x2="25" y2="100" />
    <line x1="175" y1="100" x2="185" y2="100" />
  </g>
  
  <!-- Hour numbers -->
  <text x="100" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">12</text>
  <text x="100" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">6</text>
  <text x="32" y="107" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">9</text>
  <text x="168" y="107" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">3</text>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="#333"/>
  
  <!-- Hour hand -->
  <line x1="100" y1="100" x2="100" y2="60" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="100" y1="100" x2="100" y2="40" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Second hand -->
  <line x1="100" y1="100" x2="100" y2="30" stroke="#e74c3c" stroke-width="1" stroke-linecap="round"/>
</svg>